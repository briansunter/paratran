name: Release

on:
  push:
    branches: [master]
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  quality:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest

      - name: Build package
        run: uv build --no-sources

  release-please:
    needs: quality
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: [quality, release-please]
    if: >-
      always() &&
      needs.quality.result == 'success' &&
      (needs.release-please.result == 'success' || needs.release-please.result == 'skipped') &&
      (needs.release-please.outputs.release_created == 'true' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build and publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_KEY }}
        run: |
          uv build --no-sources
          uv publish
